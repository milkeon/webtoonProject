<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alive Ending - Silver Flight</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --silver-light: #ffffff;
            --silver-mid: #b0c0d0;
            --silver-dark: #4a5a65;
            --speed-line-color: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: auto; overflow-x: hidden; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #000;
            color: #f0f0f0;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 50% 50%, #050810 0%, #000 100%);
        }

        /* ── 일렁이는 심연 배경 ── */
        .shimmer-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.2;
            background: 
                radial-gradient(circle at 20% 30%, rgba(40, 60, 150, 0.3) 0%, transparent 60%),
                radial-gradient(circle at 80% 70%, rgba(80, 40, 110, 0.3) 0%, transparent 60%);
            filter: blur(80px);
            animation: drift 25s ease-in-out infinite alternate;
        }

        @keyframes drift {
            from { transform: scale(1) rotate(0deg); }
            to   { transform: scale(1.3) rotate(5deg); }
        }

        /* ── CSS 속도선 (배경 이미지 대체) ── */
        .speed-lines {
            position: absolute;
            inset: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
        }

        .line {
            position: absolute;
            width: 1px;
            background: linear-gradient(to bottom, transparent, var(--speed-line-color), transparent);
            will-change: transform;
        }

        /* ── Scene 1: 비행 구간 ── */
        .scene1 {
            width: 100%;
            height: 4000px;
            position: relative;
        }

        /* ── 고퀄리티 총알 디자인 (fixed) ── */
        #bullet-container {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            will-change: transform;
        }

        /* 공기 압축 및 충격파 효과 */
        .shockwave {
            position: absolute;
            top: -20px;
            width: 120px;
            height: 400px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.1) 0%, transparent 70%);
            filter: blur(20px);
            border-radius: 50%;
            transform: scaleX(0.4);
            animation: vibration 0.08s infinite;
        }

        /* 총알 본체 (메탈릭 실버) */
        .bullet-core {
            position: relative;
            width: 20px;
            height: 55px;
            /* 3D 원통 질감 */
            background: linear-gradient(
                to right,
                var(--silver-dark) 0%,
                var(--silver-light) 40%,
                var(--silver-mid) 60%,
                var(--silver-dark) 100%
            );
            border-radius: 50% 50% 5px 5px / 70% 70% 10% 10%;
            box-shadow: 
                0 0 30px rgba(255, 255, 255, 0.3),
                0 0 100px rgba(100, 150, 255, 0.1);
            z-index: 102;
        }

        /* 탄두(Point) 부분 광택 */
        .bullet-core::before {
            content: '';
            position: absolute;
            top: 2px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 40%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            border-radius: 50% 50% 0 0;
            filter: blur(2px);
        }

        /* 하단 탄피 부분 */
        .bullet-core::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            width: 22px;
            height: 10px;
            background: linear-gradient(to right, #8a6d3b, #f1c40f, #8a6d3b);
            border-radius: 2px 2px 5px 5px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* 기류 왜곡 (Smoke/Air Trail) */
        .air-trail {
            position: absolute;
            top: 40px;
            width: 4px;
            height: 150px;
            background: linear-gradient(to bottom, #fff, transparent);
            filter: blur(3px);
            opacity: 0.6;
            border-radius: 2px;
        }

        @keyframes vibration {
            0% { transform: scaleX(0.4) translate(1px, -1px); }
            50% { transform: scaleX(0.44) translate(-1.5px, 1.5px); }
            100% { transform: scaleX(0.4) translate(1px, -1px); }
        }

        /* ── Scene 2 / Scene 3 연출 ── */
        .scene2 {
            width: 100%;
            height: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .final-silver {
            width: 80px;
            height: 200px;
            background: linear-gradient(to right, #444, #fff, #888);
            border-radius: 50% 50% 10% 10% / 80% 80% 20% 20%;
            box-shadow: 0 0 60px rgba(255, 255, 255, 0.6);
            opacity: 1; /* 가시성 확보 */
            transform: scale(1.2); /* 크기 복원 */
            transition: all 1s ease;
        }
        .final-silver.show { opacity: 1; transform: scale(1.2); }

        .scene3 {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title-alive {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            background-image: linear-gradient(to bottom, #fff, #ccc); /* 그라데이션 복구 */
            filter: drop-shadow(0 0 40px rgba(255, 215, 0, 0.5));
            opacity: 1; /* 가시성 확보 */
            transform: translateY(0); /* 위치 초기화 */
            transition: all 1.5s ease;
        }
        .title-alive.active { opacity: 1; transform: translateY(0); }

        .sub-text {
            font-size: 1.5rem; color: rgba(255, 255, 255, 0.8); letter-spacing: 12px;
            margin-top: 20px; opacity: 1; /* 가시성 확보 */
            transition: opacity 1s;
        }
        .sub-text.active { opacity: 1; }

        .retry-link {
            margin-top: 60px; padding: 15px 45px; border: 1px solid rgba(255, 255, 255, 0.6);
             color: #fff; text-decoration: none; border-radius: 50px; font-size: 1rem;
             letter-spacing: 5px; opacity: 1; /* 가시성 확보 */
             transition: opacity 1s;
        }
        .retry-link.active { opacity: 1; }
        .retry-link:hover { background: #fff; color: #000; box-shadow: 0 0 30px #fff; }

        .white-out {
            position: fixed; inset: 0; background: #fff; z-index: 1000;
            opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }

        /* ── 레이아웃 ── */
        .mainpage { display: flex; justify-content: center; }
        .content { width: 50%; }
        @media (max-width: 800px) { .content { width: 100%; } }
    </style>
</head>

<body>
    <div class="shimmer-bg"></div>
    <div class="white-out" id="whiteOut"></div>

    <div class="mainpage">
        <div class="content">
            <div class="scene1" id="scene1">
                <div class="speed-lines" id="speedLines"></div>
            </div>

            <div class="scene2" id="scene2">
                <div class="final-silver" id="finalSilver"></div>
            </div>

            <div class="scene3">
                <h1 class="title-alive" id="titleAlive">Alive</h1>
                <p class="sub-text" id="subText">생존자다!!</p>
                <a href="index.html" class="retry-link" id="retryLink">처음부터</a>
            </div>
        </div>
    </div>

    <div id="bullet-container">
        <div class="shockwave"></div>
        <div class="air-trail"></div>
        <div class="bullet-core"></div>
    </div>

    <script>
        const bulletContainer = document.getElementById('bullet-container');
        const speedLines = document.getElementById('speedLines');
        const scene1 = document.getElementById('scene1');
        const finalSilver = document.getElementById('finalSilver');
        const whiteOut = document.getElementById('whiteOut');
        const titleAlive = document.getElementById('titleAlive');
        const subText = document.getElementById('subText');
        const retryLink = document.getElementById('retryLink');

        // 속도선 생성
        for (let i = 0; i < 100; i++) {
            const line = document.createElement('div');
            line.className = 'line';
            line.style.left = Math.random() * 100 + '%';
            line.style.top = Math.random() * 100 + '%';
            line.style.height = (50 + Math.random() * 200) + 'px';
            line.style.opacity = 0.05 + Math.random() * 0.2;
            speedLines.appendChild(line);
        }

        let isImpacted = false;

        window.addEventListener('scroll', () => {
            const vh = window.innerHeight;
            const r1 = scene1.getBoundingClientRect();
            const scene1Height = scene1.offsetHeight;
            const progress = Math.max(0, Math.min(1, -r1.top / (scene1Height - vh)));

            if (r1.bottom > vh * 0.5) {
                bulletContainer.style.opacity = 1;
                // 속도감에 따른 모션 블러 (ScaleY)와 미세 진동
                const stretch = 1 + progress * 0.8;
                const shake = (Math.random() - 0.5) * 6;
                bulletContainer.style.transform = `translate(calc(-50% + ${shake}px), -50%) scaleY(${stretch})`;
                
                // 속도선 애니메이션 (패럴렉스)
                const lines = document.querySelectorAll('.line');
                lines.forEach((l, idx) => {
                    const speed = 5 + (idx % 15);
                    l.style.transform = `translateY(${r1.top * speed}px)`;
                });
            } else {
                bulletContainer.style.opacity = 0;
                
                if (!isImpacted && r1.bottom < 150) {
                    isImpacted = true;
                    whiteOut.style.opacity = 0.9;
                    setTimeout(() => whiteOut.style.opacity = 0, 400);
                    finalSilver.classList.add('show');
                    
                    setTimeout(() => {
                        titleAlive.classList.add('active');
                        subText.classList.add('active');
                        retryLink.classList.add('active');
                    }, 600);
                }
            }
        }, { passive: true });
    </script>
</body>

</html>
