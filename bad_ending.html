<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead Ending - Cold Darkness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: auto;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #000;
            color: #f0f0f0;
            overflow-x: hidden;
        }

        /* ── 일렁이는 어둠 배경 ── */
        .shimmer-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(circle at 30% 20%, rgba(20, 20, 40, 0.6) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(30, 10, 20, 0.4) 0%, transparent 50%),
                #000;
            filter: blur(50px);
            animation: darkness-drift 15s ease-in-out infinite alternate;
        }

        @keyframes darkness-drift {
            from {
                transform: scale(1.1) translate(-10px, -10px);
                opacity: 0.7;
            }

            to {
                transform: scale(1) translate(10px, 10px);
                opacity: 0.4;
            }
        }

        /* ── 메인 콘텐츠 구조 ── */
        .mainpage {
            display: flex;
            justify-content: center;
        }

        .content {
            width: 50%;
            height: 100%;
            position: relative;
        }

        .scene {
            width: 100%;
            height: 800px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            /* 하단 정렬 */
            justify-content: center;
            padding-bottom: 20vh;
            /* 하단에서부터의 간격 */
        }

        /* 배경 이미지 패럴렉스 */
        .scene img.bg-img {
            width: 100%;
            height: 140%;
            object-fit: cover;
            position: absolute;
            top: -20%;
            left: 0;
            will-change: transform;
            opacity: 0.4;
            filter: grayscale(0.5) contrast(1.2);
        }

        /* (수정) 씬 1: 전체적으로 밝게 표현 */
        #scene1 img.bg-img {
            opacity: 0.9;
            filter: brightness(1.2);
        }

        #scene1 .vignette {
            display: none;
        }

        /* 씬 1은 필터 제거하여 최대한 밝게 */

        /* (수정) 씬 2: 배경 위에 깊이 있는 그라데이션 오버레이 */
        #scene2 {
            background: #000;
        }

        #scene2 img.bg-img {
            opacity: 0.3;
        }

        #scene2 .vignette {
            background: linear-gradient(to bottom,
                    rgba(0, 0, 0, 1) 0%,
                    rgba(0, 0, 0, 0.2) 50%,
                    rgba(0, 0, 0, 1) 100%);
            opacity: 1;
            z-index: 5;
        }

        /* 겹겹이 쌓인 어둠 오버레이 */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0, 0, 0, 0.9) 100%);
            z-index: 2;
        }

        .overlay-text {
            position: relative;
            z-index: 10;
            font-size: 2rem;
            /* 크기 축소 */
            font-weight: 900;
            color: rgba(255, 255, 255, 0.7);
            /* 색상 밝기 상향 */
            text-align: center;
            letter-spacing: 15px;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            opacity: 1;
            /* 가시성 확보 */
            transform: scale(1);
            /* 크기 복원 */
            transition: all 1.5s ease;
        }

        .overlay-text.show {
            opacity: 1;
            transform: scale(1);
        }

        /* ── 최종 결말 섹션 ── */
        .scene3 {
            height: 200vh;
            background: #000;
            display: flex;
            /* flex 추가 */
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .title-dead {
            font-size: clamp(6rem, 20vw, 12rem);
            font-weight: 900;
            color: #ff1010;
            letter-spacing: -5px;
            text-shadow:
                0 0 30px rgba(255, 0, 0, 0.4),
                0 0 60px rgba(0, 0, 0, 0.8);
            opacity: 1;
            /* 가시성 확보 */
            transition: all 2s ease;
        }

        .sub-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 20px;
            letter-spacing: 5px;
            opacity: 1;
            /* 가시성 확보 */
        }

        .blackout-img {
            width: 100%; /* 너비 꽉 채우기 */
            height: auto;
            margin: 50vh 0 0 0; /* 상단 여백 유지, 하단 여백은 버튼 margin으로 제어 */
            opacity: 1;
            z-index: 5;
            filter: brightness(0.4); /* 더 어둡게 조정 */
        }

        .retry-link {
            margin-top: 100vh; /* 이미지 아래로 충분히 스크롤해야 나오도록 */
            margin-bottom: 20vh;
            padding: 12px 35px;
            border: 1px solid rgba(255, 0, 0, 0.6);
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.8rem;
            letter-spacing: 4px;
            transition: all 0.5s;
            opacity: 1;
            /* 가시성 확보 */
        }

        .retry-link:hover {
            border-color: #f00;
            color: #f00;
            background: rgba(255, 0, 0, 0.05);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        @media (max-width: 800px) {
            .content {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="shimmer-bg"></div>

    <div class="mainpage">
        <div class="content">
            <!-- Scene 1 -->
            <div class="scene" id="scene1">
                <img src="배경.jpg" class="bg-img" id="img1">
                <div class="vignette"></div>
                <div class="overlay-text" id="txt1" style="color: rgb(255, 255, 255, 0.6)">아...</div>
            </div>

            <!-- Scene 2 -->
            <div class="scene" id="scene2">
                <img src="배경.jpg" class="bg-img" id="img2">
                <div class="vignette"></div>
                <div class="overlay-text" id="txt2" style="color: rgb(255, 255, 255, 0.2)">안되는..ㄷ...</div>
            </div>

            <!-- Scene 3: Dead -->
            <div class="scene scene3" id="scene3">
                <img src="assets/암전.png" class="blackout-img">
                <a href="index.html" class="retry-link" id="retryLink">시간 되돌리기</a>
            </div>
        </div>
    </div>

</html>
