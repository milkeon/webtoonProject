<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dead Ending - Cold Darkness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: auto; }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: #000;
            color: #f0f0f0;
            overflow-x: hidden;
        }

        /* ── 일렁이는 어둠 배경 ── */
        .shimmer-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: 
                radial-gradient(circle at 30% 20%, rgba(20, 20, 40, 0.6) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(30, 10, 20, 0.4) 0%, transparent 50%),
                #000;
            filter: blur(50px);
            animation: darkness-drift 15s ease-in-out infinite alternate;
        }

        @keyframes darkness-drift {
            from { transform: scale(1.1) translate(-10px, -10px); opacity: 0.7; }
            to   { transform: scale(1) translate(10px, 10px); opacity: 0.4; }
        }

        /* ── 메인 콘텐츠 구조 ── */
        .mainpage { display: flex; justify-content: center; }
        .content { width: 50%; height: 100%; position: relative; }

        .scene {
            width: 100%;
            height: 800px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 배경 이미지 패럴렉스 */
        .scene img.bg-img {
            width: 100%;
            height: 140%;
            object-fit: cover;
            position: absolute;
            top: -20%;
            left: 0;
            will-change: transform;
            opacity: 0.4;
            filter: grayscale(0.5) contrast(1.2);
        }

        /* 겹겹이 쌓인 어둠 오버레이 */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.9) 100%);
            z-index: 2;
        }

        .overlay-text {
            position: relative;
            z-index: 10;
            font-size: 3rem;
            font-weight: 900;
            color: rgba(255, 255, 255, 0.2);
            text-align: center;
            letter-spacing: 15px;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            opacity: 0;
            transform: scale(0.95);
            transition: all 1.5s ease;
        }
        .overlay-text.show {
            opacity: 1;
            transform: scale(1);
            color: rgba(255, 255, 255, 0.7);
        }

        /* ── 최종 결말 섹션 ── */
        .scene3 {
            height: 100vh;
            background: #000;
            flex-direction: column;
        }

        .title-dead {
             font-size: clamp(6rem, 20vw, 12rem);
             font-weight: 900;
             color: #600;
             letter-spacing: -5px;
             text-shadow: 
                0 0 30px rgba(255, 0, 0, 0.4),
                0 0 60px rgba(0,0,0,0.8);
             opacity: 0;
             transition: all 2s ease;
        }
        .title-dead.active { opacity: 1; color: #ff1010; }

        .sub-text {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.3);
            margin-top: 20px;
            letter-spacing: 5px;
            opacity: 0;
            transition: opacity 1s ease 1s;
        }
        .sub-text.active { opacity: 1; }

        .retry-link {
            margin-top: 50px;
            padding: 12px 35px;
            border: 1px solid rgba(255, 0, 0, 0.2);
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.8rem;
            letter-spacing: 4px;
            transition: all 0.5s;
            opacity: 0;
        }
        .retry-link.active { opacity: 1; }
        .retry-link:hover {
            border-color: #f00;
            color: #f00;
            background: rgba(255, 0, 0, 0.05);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }

        @media (max-width: 800px) { .content { width: 100%; } }
    </style>
</head>

<body>
    <div class="shimmer-bg"></div>

    <div class="mainpage">
        <div class="content">
            <!-- Scene 1 -->
            <div class="scene" id="scene1">
                <img src="배경.jpg" class="bg-img" id="img1">
                <div class="vignette"></div>
                <div class="overlay-text" id="txt1">아...</div>
            </div>

            <!-- Scene 2 -->
            <div class="scene" id="scene2">
                <img src="배경.jpg" class="bg-img" id="img2">
                <div class="vignette"></div>
                <div class="overlay-text" id="txt2">안되는..ㄷ...</div>
            </div>

            <!-- Scene 3: Dead -->
            <div class="scene scene3" id="scene3">
                <h1 class="title-dead" id="titleDead">Dead</h1>
                <p class="sub-text" id="subText">영원한 어둠 속으로...</p>
                <a href="index.html" class="retry-link" id="retryLink">다시 시도</a>
            </div>
        </div>
    </div>

    <script>
        const img1 = document.getElementById('img1');
        const img2 = document.getElementById('img2');
        const txt1 = document.getElementById('txt1');
        const txt2 = document.getElementById('txt2');
        const scene3 = document.getElementById('scene3');
        const titleDead = document.getElementById('titleDead');
        const subText = document.getElementById('subText');
        const retryLink = document.getElementById('retryLink');

        window.addEventListener('scroll', () => {
            const vh = window.innerHeight;
            
            // 패럴렉스
            const r1 = img1.parentElement.getBoundingClientRect();
            const r2 = img2.parentElement.getBoundingClientRect();
            img1.style.transform = `translateY(${-r1.top * 0.4}px)`;
            img2.style.transform = `translateY(${-r2.top * 0.4}px)`;

            // 텍스트 등장
            if (r1.top < vh * 0.5) txt1.classList.add('show');
            if (r2.top < vh * 0.5) txt2.classList.add('show');

            // 결말 등장
            const r3 = scene3.getBoundingClientRect();
            if (r3.top < vh * 0.6) {
                titleDead.classList.add('active');
                subText.classList.add('active');
                retryLink.classList.add('active');
            }
        }, { passive: true });
    </script>
</body>

</html>
