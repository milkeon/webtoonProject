<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alive Ending</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #ffffff;
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow-x: hidden;
        }

        .mainpage {
            display: flex;
            justify-content: center;
        }

        .content {
            width: 50%;
        }

        .scene {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            background-color: gray;
        }

        /* ── 세로로 훨씬 긴 씬 설정 ── */
        .scene-ultra-long {
            height: auto;
            padding-bottom: 50px;
            /* 이미지 바로 아래 최소 여백 */
        }

        .ending-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 빛 이미지가 화면에 꽉 차고 세로로 늘어나게 설정 */
        .laser-img {
            width: 100%;
            height: 300vh;
            /* 다시 길게 유지 */
            object-fit: fill;
        }

        /* ── 마지막 장면 재시도 버튼 ── */
        .retry-scene {
            padding-bottom: 20vh;
            justify-content: center;
        }

        .retry-link {
            display: inline-block;
            margin-top: 50px;
            padding: 18px 55px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.1rem;
            letter-spacing: 5px;
            transition: all 0.3s;
        }

        .retry-link:hover {
            background: #fff;
            color: #000;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.6);
        }

        /* 희망 이미지 스타일 (CSS Scroll-driven Animation 적용) */
        .hope-scene {
            background: #fff;
            min-height: 300vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
            position: relative;
            /* 스크롤 타임라인 이름 정의 */
            view-timeline-name: --hope-timeline;
            view-timeline-axis: block;
        }

        @keyframes hope-zoom {
            0%, 15% { transform: translateY(-50%) scale(1); opacity: 0.8; }
            100% { transform: translateY(-50%) scale(60); opacity: 1; }
        }

        .hope-img {
            width: 100%;
            height: auto;
            position: sticky;
            top: 50%;
            transform: translateY(-50%) scale(1);
            opacity: 1;
            will-change: transform, opacity;
            /* CSS 애니메이션 연동 */
            animation: hope-zoom linear both;
            animation-timeline: --hope-timeline;
            animation-range: entry 0% exit 100%;
            animation-timing-function: cubic-bezier(0.7, 0, 0.84, 0); /* 급격한 확대 효과 */
        }

        @keyframes white-out-fade {
            0%, 60% { opacity: 0; }
            100% { opacity: 1; }
        }

        /* 화이트아웃 오버레이 */
        .white-out {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            /* CSS 애니메이션 연동 */
            animation: white-out-fade linear both;
            animation-timeline: --hope-timeline;
            animation-range: entry 0% exit 100%;
        }

        @media (max-width: 800px) {
            .content {
                width: 100%;
            }
        }

        /* ── 이스터 에그 (진 엔딩) 버튼 ── */
        .easter-egg {
            position: relative;
            z-index: 101;
            padding: 100px 0 20vh 0;
            text-align: center;
        }

        .easter-egg a {
            display: inline-block;
            padding: 12px 35px;
            border: 2px solid rgba(47, 0, 255, 0.6);
            color: rgba(76, 0, 255, 0.6);
            text-decoration: none;
            border-radius: 50px;
            font-size: 1rem;
            letter-spacing: 4px;
            transition: all 0.5s;
        }

        .easter-egg a:hover {
            border-color: rgb(0, 204, 255);
            color: rgb(0, 174, 255) !important;
            background: rgba(255, 0, 0, 0.05);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.2);
        }
    </style>
</head>

<body>
    <div class="white-out" id="whiteOut"></div>
    <div class="mainpage">
        <div class="content">

            <!-- Scene 2: 세로로 길게 늘린 순수 광선 (Laser Only) -->
            <div class="scene scene-ultra-long" id="scene2">
                <img src="laser-beam.png" class="laser-img" alt="Long Bullet Trajectory">
                <p
                    style="color: rgb(41, 40, 40); font-size: 4rem; font-weight: 900; margin-top: 100px; letter-spacing: 10px;">
                    털썩</p>
            </div>
            <div class="dialogue-section" style="padding: 100px 0; text-align: center; color: #333;">
                <p style="font-size: 2.2rem; margin-bottom: 40px; font-weight: 300;">"거기 사람 있습니까? 구조대입니다"</p>
                <p style="font-size: 2.8rem; font-weight: 900; color: #000;">"네!! 저 여기있어요!!!"</p>
            </div>

            <!-- Scene 3: 희망의 서광 (hope.jpg) - 스크롤 확대 및 화이트아웃 -->
            <div class="hope-scene" id="hopeScene">
                <img src="assets/hope.jpg" class="hope-img" id="hopeImg" alt="Hope">
            </div>

            <div class="easter-egg">
                <a href="https://jik-k.github.io/yugioh-card-gallery/">구조 후일담</a>
            </div>
        </div>
    </div>

    <!-- 스크롤 애니메이션은 이제 CSS (Scroll-driven Animation)로 처리됩니다. -->
</body>

</html>
