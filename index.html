<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>흡혈귀의 추격 - 인터랙티브 웹툰</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        // 화면 진입 시 항상 맨 위부터 보여주기
        window.onload = function () {
            setTimeout(function () {
                window.scrollTo(0, 0);
            }, 10);
        };
        if ('scrollRestoration' in history) {
            history.scrollRestoration = 'manual';
        }

        // 3번째 클릭 시 확실하게 생존 엔딩으로 이동시키기
        document.addEventListener('DOMContentLoaded', function () {
            const trigger3 = document.getElementById('trigger-3');
            if (trigger3) {
                trigger3.addEventListener('change', function () {
                    if (this.checked) {
                        // 약간의 지연을 주어 CSS 상태 변화가 반영된 후 이동
                        setTimeout(() => {
                            window.location.hash = '#survival-anchor';
                        }, 50);
                    }
                });
            }
        });
    </script>
</head>

<body>
    <!-- 상태 관리용 숨겨진 체크박스 -->
    <input type="checkbox" id="trigger-1" class="trigger-check">
    <input type="checkbox" id="trigger-2" class="trigger-check">
    <input type="checkbox" id="trigger-3" class="trigger-check">

    <div class="container">
        <!-- Scene 1: 추격 -->
        <section class="scene intro">
            <div class="content">
                <!-- <h1 class="title">흡혈귀의 추격</h1> -->
                <p class="desc">타닥....탁.....</p>
            </div>
            <div class="content">
                <!-- <h1 class="title">흡혈귀의 추격</h1> -->
                <p class="desc">헉....허억.....</p>
            </div>
            <!-- <img src="assets/scene1_run01_1773718414268.png" alt="도망치는 주인공" class="scene-img"> -->
        </section>

        <!-- Scene 2: 발견 및 점프스케어 -->
        <section class="scene suspense">
            <div class="scare-trigger"></div>
            <!-- <img src="assets/scene2_jumpscare01_1773718441888.png" alt="흡혈귀의 습격" class="jumpscare-img"> -->

            <div class="content">
                <!-- <p class="desc accent">갑자기 나타난 그림자!</p> -->
                <p class="desc">'총이다!!'</p>
            </div>
            <div class="revolver-view">
                <!-- <img src="assets/scene2_revolver01_1773718426723.png" alt="리볼버" class="scene-img"> -->
            </div>
        </section>

        <!-- Scene 3: 선택 (방아쇠) -->
        <section class="scene interaction">
            <div class="vignette"></div>
            <div class="interaction-ui">
                <p class="instruction">은 탄환이 들어있잖아?! 살았다!!</p>
                <div class="trigger-buttons">
                    <!-- 1, 2회 클릭: 찰칵 -->
                    <div class="click-effect eff-1">찰칵</div>
                    <label for="trigger-1" class="trigger-btn btn-1">방아쇠 당기기</label>

                    <div class="click-effect eff-2">찰칵</div>
                    <label for="trigger-2" class="trigger-btn btn-2">방아쇠 당기기</label>

                    <!-- 3회 클릭: 타앙!! (발사 효과 발생과 동시에 생존지로 이동) -->
                    <div class="click-effect eff-3">타앙!!</div>
                    <label for="trigger-3" class="trigger-btn btn-3" onclick="location.href='#survival-anchor'">방아쇠 당기기</label>
                </div>
            </div>
        </section>

        <!-- Scene 4: 결말 분기 -->
        <div class="ending-wrapper">
            <!-- 사망 엔딩 (기본) -->
            <section class="scene ending death" id="death-ending">
                <!-- <img src="assets/scene4_death01_1773718473960.png" alt="사망" class="scene-img"> -->
                <div class="content overlay">
                    <h2 class="end-title">발사 실패</h2>
                    <p class="desc">아......안되는데.......</p>
                    <a href="index.html" class="retry-btn">다시 시도</a>
                </div>
            </section>

            <!-- 생존 엔딩 (3번 클릭 시 노출) -->
            <section class="scene ending survival" id="survival-anchor">
                <!-- <img src="assets/scene4_survival01_1773718457702.png" alt="생존" class="scene-img"> -->
                <div class="content overlay">
                    <h2 class="end-title">생존</h2>
                    <p class="desc">생존자다!!</p>
                    <a href="index.html" class="retry-btn">다시 하기</a>
                </div>
            </section>
        </div>
    </div>
</body>

</html>
