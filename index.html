<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>흡혈귀의 추격 - 인터랙티브 웹툰</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
</head>

<body>
    <div class="shimmer-bg"></div>

    <!-- 스크롤 진행 바 -->
    <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="mainpage">
        <div class="content">

            <!-- Scene 1: 추격 -->
            <div class="scene1">
                <div class="content-block parallax-item" data-speed="0.15">
                    <p class="desc">타닥....탁.....</p>
                </div>
                <div class="content-block parallax-item" data-speed="0.2">
                    <p class="desc">헉....허억.....</p>
                </div>
                <div class="content-block slide-up" data-delay="0">
                    <p class="desc">어느 날부터 갑자기 나타난 흡혈귀들로 인해, 도시의 불빛은 사라졌다</p>
                </div>
                <div class="content-block slide-up" data-delay="150">
                    <p class="desc">사람들은 흡혈귀를 피해 불을 끄고 도망다녔으나, 어둠은 인류의 편이 아니었다</p>
                </div>
            </div>

            <!-- Scene 2: 발견 -->
            <div class="scene2 fade-up">
                <p class="desc accent">'총이다!!'</p>
                <p class="desc">은 탄환이 들어있잖아?! 살았다!!</p>
            </div>

            <!-- Scene 3: 리볼버 약실 (라디오 버튼 회전 방식) -->
            <div class="scene3">
                <div class="main-wrapper">
                    <!-- 6발 약실 제어용 라디오 버튼 -->
                    <input type="radio" name="rotator" id="step1" checked>
                    <input type="radio" name="rotator" id="step2">
                    <input type="radio" name="rotator" id="step3">
                    <input type="radio" name="rotator" id="step4">
                    <input type="radio" name="rotator" id="step5">
                    <input type="radio" name="rotator" id="step6">

                    <!-- 반원 약실 뷰 -->
                    <div class="carousel-view">
                        <ul class="item-list">
                            <li class="item">O</li>
                            <li class="item">O</li>
                            <li class="item">O</li>
                            <li class="item">O</li>
                            <li class="item">O</li>
                            <!-- 6번째 약실: 은 탄환 -->
                            <li class="item silver">O</li>
                        </ul>
                    </div>

                    <!-- 중앙 방아쇠 버튼 영역 -->
                    <div class="center-button-area">
                        <!-- step1 상태: step2로 이동 -->
                        <label for="step2" class="btn b1">방아쇠</label>
                        <!-- step2 상태: step3으로 이동 -->
                        <label for="step3" class="btn b2">방아쇠</label>
                        <!-- step3 상태: 3번째 방아쇠 → 1초 후 해피엔딩 이동 (JS 처리) -->
                        <div class="btn b3" id="btn3">방아쇠</div>
                        <!-- step4 상태: step5로 이동 -->
                        <label for="step5" class="btn b4">방아쇠</label>
                        <!-- step5 상태: step6으로 이동 (은 탄환!) -->
                        <label for="step6" class="btn b5 silver-btn">방아쇠</label>
                        <!-- step6 상태: 발사! → 생존 엔딩 페이지로 이동 -->
                        <a href="happy_ending.html" class="btn b6 fire-btn" id="fireTrigger">발사!!</a>
                    </div>

                    <!-- 단계별 안내 텍스트 -->
                    <div class="step-hint">
                        <span class="hint h1">찰칵...</span>
                        <span class="hint h2">찰칵...</span>
                        <span class="hint h3">찰칵...</span>
                        <span class="hint h4">찰칵...</span>
                        <span class="hint h5 gold">딸깍— 은 탄환!!</span>
                        <span class="hint h6 fire">타앙!!</span>
                    </div>
                </div>
            </div>

            <!-- Scene 4: 사망 엔딩 (발사 안 했을 때) -->
            <div class="scene4">
                <div class="ending death-ending">
                    <p class="desc dim">...방아쇠를 당기지 못했다</p>
                    <a href="bad_ending.html" class="end-link">Dead Ending →</a>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
